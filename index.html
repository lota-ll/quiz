<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тести ПМК-1 | Ортопедична стоматологія - 3 курс</title>
<meta name="description" content="Інтерактивна платформа для підготовки до ПМК-1 з ортопедичної стоматології. 370 тестових питань з відповідями.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--surface3:#293548;
--border:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);
--correct:#10b981;--correct-bg:rgba(16,185,129,.12);--correct-border:rgba(16,185,129,.3);
--wrong:#ef4444;--wrong-bg:rgba(239,68,68,.12);--wrong-border:rgba(239,68,68,.3);
--radius:12px;--radius-lg:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
.app{max-width:800px;margin:0 auto;padding:16px}

/* ── Header ── */
.header{text-align:center;padding:40px 20px 30px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.logo{font-size:14px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px}
.header h1{font-size:clamp(22px,4vw,32px);font-weight:800;background:linear-gradient(135deg,#e2e8f0,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:var(--text2);font-size:14px}

/* ── Start Screen ── */
.start-screen{text-align:center;padding:50px 20px;animation:fadeIn .5s}
.start-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 30px;max-width:500px;margin:0 auto}
.start-card h2{font-size:22px;margin-bottom:12px;font-weight:700}
.start-card p{color:var(--text2);margin-bottom:24px;font-size:15px}
.stat-row{display:flex;gap:12px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
.stat-box{background:var(--surface2);border-radius:10px;padding:14px 20px;min-width:100px;flex:1}
.stat-box .num{font-size:26px;font-weight:800;color:var(--accent2)}
.stat-box .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.mode-buttons{display:flex;flex-direction:column;gap:10px}
.mode-btn{padding:14px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;transition:all .2s}
.mode-btn.primary{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff}
.mode-btn.primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,.35)}
.mode-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.mode-btn.secondary:hover{border-color:var(--accent);background:var(--accent-glow)}

/* ── Progress Bar ── */
.progress-wrap{padding:16px 0}
.progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--text2)}
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width .4s ease}

/* ── Question Card ── */
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;margin-bottom:16px;animation:slideUp .35s ease}
.q-number{font-size:12px;font-weight:600;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.q-text{font-size:17px;font-weight:500;line-height:1.7;margin-bottom:24px}

/* ── Options ── */
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.option{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .2s;position:relative}
.option:hover:not(.disabled){border-color:var(--accent);background:var(--accent-glow);transform:translateX(4px)}
.option.disabled{cursor:default}
.option.selected{border-color:var(--accent);background:var(--accent-glow)}
.option.correct{border-color:var(--correct-border) !important;background:var(--correct-bg) !important}
.option.wrong{border-color:var(--wrong-border) !important;background:var(--wrong-bg) !important}
.opt-letter{min-width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--surface3);color:var(--text2);transition:all .2s;flex-shrink:0}
.option.selected .opt-letter{background:var(--accent);color:#fff}
.option.correct .opt-letter{background:var(--correct);color:#fff}
.option.wrong .opt-letter{background:var(--wrong);color:#fff}
.opt-text{font-size:15px;padding-top:3px;line-height:1.5}

/* ── Feedback ── */
.feedback{padding:14px 18px;border-radius:var(--radius);margin-bottom:16px;font-size:14px;font-weight:500;animation:fadeIn .3s}
.feedback.correct-fb{background:var(--correct-bg);border:1px solid var(--correct-border);color:var(--correct)}
.feedback.wrong-fb{background:var(--wrong-bg);border:1px solid var(--wrong-border);color:var(--wrong)}
.feedback .icon{font-size:18px;margin-right:8px}

/* ── Navigation ── */
.nav-row{display:flex;gap:10px;justify-content:space-between;margin-bottom:30px}
.nav-btn{padding:12px 28px;border-radius:var(--radius);font-size:14px;font-weight:600;transition:all .2s}
.nav-btn.next{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;margin-left:auto}
.nav-btn.next:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.3)}
.nav-btn.back{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.nav-btn.back:hover{border-color:var(--accent)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── Results Screen ── */
.results{text-align:center;padding:40px 20px;animation:fadeIn .5s}
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 30px;max-width:500px;margin:0 auto}
.score-circle{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:36px;font-weight:800;position:relative}
.score-circle::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct)*3.6deg),var(--surface3) 0);z-index:0}
.score-circle::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--surface);z-index:1}
.score-circle span{position:relative;z-index:2}
.score-circle .pct{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--accent2),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-circle .pct-sign{font-size:18px;font-weight:600}
.results h2{font-size:22px;font-weight:700;margin-bottom:8px}
.results .sub{color:var(--text2);margin-bottom:24px;font-size:15px}
.result-stats{display:flex;gap:12px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
.r-stat{background:var(--surface2);border-radius:10px;padding:12px 18px;min-width:90px}
.r-stat .r-num{font-size:22px;font-weight:700}
.r-stat .r-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.r-stat.green .r-num{color:var(--correct)}
.r-stat.red .r-num{color:var(--wrong)}
.r-stat.gray .r-num{color:var(--text2)}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── Responsive ── */
@media(max-width:600px){
  .app{padding:10px}
  .question-card{padding:20px 16px}
  .q-text{font-size:15px}
  .option{padding:12px}
  .opt-text{font-size:14px}
  .start-card,.results-card{padding:28px 18px}
}

/* ── Review list ── */
.review-list{max-width:800px;margin:0 auto;text-align:left}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px}
.review-item.ri-correct{border-left:3px solid var(--correct)}
.review-item.ri-wrong{border-left:3px solid var(--wrong)}
.review-item.ri-skip{border-left:3px solid var(--text3)}
.ri-q{font-size:14px;font-weight:500;margin-bottom:8px}
.ri-info{font-size:13px;color:var(--text2)}
.ri-info span{font-weight:600}
.ri-your{color:var(--wrong)}
.ri-right{color:var(--correct)}

.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;background:var(--surface2);color:var(--text2);border:1px solid var(--border);transition:all .2s}
.filter-btn.active{background:var(--accent-glow);color:var(--accent2);border-color:var(--accent)}
.filter-btn:hover{border-color:var(--accent)}

/* shuffle toggle */
.toggle-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-top:16px;margin-bottom:8px}
.toggle-label{font-size:13px;color:var(--text2)}
.toggle{width:44px;height:24px;border-radius:12px;background:var(--surface3);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle.on::after{transform:translateX(20px)}

.count-input{display:flex;align-items:center;gap:10px;justify-content:center;margin:12px 0}
.count-input label{font-size:13px;color:var(--text2)}
.count-input input{width:70px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;text-align:center;font-family:inherit}
.count-input input:focus{border-color:var(--accent);outline:none}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="logo">🦷 Стоматологія</div>
    <h1>Тести ПМК-1 — 3 курс</h1>
    <p>Ортопедична стоматологія · 2026</p>
  </div>
  <div id="content"></div>
</div>

<script>
// Questions will be loaded from questions.json
let ALL_QUESTIONS = [];
let quiz = { questions:[], current:0, answers:[], mode:'all', total:0 };

async function loadQuestions() {
  try {
    const r = await fetch('questions.json');
    ALL_QUESTIONS = await r.json();
    // Filter: only questions with correct answer and at least 2 options
    ALL_QUESTIONS = ALL_QUESTIONS.filter(q => q.correct >= 0 && q.answers.length >= 2 && q.question.length > 15);
    showStart();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="start-screen"><div class="start-card"><h2>Помилка завантаження</h2><p>Не вдалося завантажити файл questions.json. Переконайтеся, що він знаходиться в тій самій папці.</p></div></div>`;
  }
}

function showStart() {
  const totalQ = ALL_QUESTIONS.length;
  // Load best score from localStorage
  const best = localStorage.getItem('quiz_best');
  const bestHtml = best ? `<div class="stat-box"><div class="num">${best}%</div><div class="label">Найкращий</div></div>` : '';
  
  document.getElementById('content').innerHTML = `
  <div class="start-screen">
    <div class="start-card">
      <h2>Готові до тестування?</h2>
      <p>Перевірте свої знання з ортопедичної стоматології</p>
      <div class="stat-row">
        <div class="stat-box"><div class="num">${totalQ}</div><div class="label">Питань</div></div>
        <div class="stat-box"><div class="num">5</div><div class="label">Варіантів</div></div>
        ${bestHtml}
      </div>
      <div class="count-input">
        <label>Кількість питань:</label>
        <input type="number" id="qCount" min="5" max="${totalQ}" value="${totalQ}">
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Перемішати питання</span>
        <div class="toggle on" id="shuffleToggle" onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="mode-buttons" style="margin-top:18px">
        <button class="mode-btn primary" onclick="startQuiz('practice')">🎯 Режим тренування</button>
        <button class="mode-btn secondary" onclick="startQuiz('exam')">📝 Режим іспиту</button>
      </div>
      <p style="margin-top:14px;font-size:12px;color:var(--text3)">Тренування — відповідь одразу · Іспит — результат в кінці</p>
    </div>
  </div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length -1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startQuiz(mode) {
  const countEl = document.getElementById('qCount');
  const doShuffle = document.getElementById('shuffleToggle').classList.contains('on');
  let count = parseInt(countEl.value) || ALL_QUESTIONS.length;
  count = Math.min(Math.max(count, 1), ALL_QUESTIONS.length);
  
  let qs = doShuffle ? shuffle(ALL_QUESTIONS) : [...ALL_QUESTIONS];
  qs = qs.slice(0, count);
  
  quiz = { questions: qs, current: 0, answers: new Array(qs.length).fill(-1), mode, total: qs.length };
  renderQuestion();
}

function renderQuestion() {
  const q = quiz.questions[quiz.current];
  const idx = quiz.current;
  const answered = quiz.answers[idx] !== -1;
  const pct = ((idx + (answered?1:0)) / quiz.total * 100).toFixed(0);
  const letters = 'ABCDE';
  
  let optHtml = '';
  q.answers.forEach((a, i) => {
    let cls = 'option';
    if (answered) {
      cls += ' disabled';
      if (i === q.correct) cls += ' correct';
      if (quiz.answers[idx] === i && i !== q.correct) cls += ' wrong';
      if (quiz.answers[idx] === i && i === q.correct) cls += ' correct';
    }
    optHtml += `<div class="${cls}" ${!answered ? `onclick="selectAnswer(${i})"` : ''}>
      <div class="opt-letter">${letters[i] || (i+1)}</div>
      <div class="opt-text">${escHtml(a)}</div>
    </div>`;
  });

  let feedbackHtml = '';
  if (answered && quiz.mode === 'practice') {
    if (quiz.answers[idx] === q.correct) {
      feedbackHtml = `<div class="feedback correct-fb"><span class="icon">✅</span> Правильно!</div>`;
    } else {
      feedbackHtml = `<div class="feedback wrong-fb"><span class="icon">❌</span> Неправильно. Вірна відповідь: <strong>${letters[q.correct]}. ${escHtml(q.answers[q.correct])}</strong></div>`;
    }
  }

  const isLast = idx === quiz.total - 1;
  const nextLabel = isLast ? (answered ? 'Завершити' : 'Наступне') : 'Наступне →';

  document.getElementById('content').innerHTML = `
  <div class="progress-wrap">
    <div class="progress-info">
      <span>Питання ${idx+1} з ${quiz.total}</span>
      <span>${pct}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="question-card">
    <div class="q-number">Питання ${idx+1}</div>
    <div class="q-text">${escHtml(q.question)}</div>
    <div class="options">${optHtml}</div>
    ${feedbackHtml}
  </div>
  <div class="nav-row">
    <button class="nav-btn back" onclick="prevQuestion()" ${idx===0?'disabled':''}>← Назад</button>
    <button class="nav-btn next" onclick="${isLast && answered ? 'showResults()' : 'nextQuestion()'}" ${!answered && quiz.mode==='practice'?'disabled':''}>${nextLabel}</button>
  </div>`;
  
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectAnswer(i) {
  if (quiz.answers[quiz.current] !== -1) return;
  quiz.answers[quiz.current] = i;
  if (quiz.mode === 'exam') {
    // In exam mode, auto-advance after short delay
    renderQuestion();
    if (quiz.current < quiz.total - 1) {
      setTimeout(() => nextQuestion(), 400);
    }
  } else {
    renderQuestion();
  }
}

function nextQuestion() {
  if (quiz.current < quiz.total - 1) {
    quiz.current++;
    renderQuestion();
  } else if (quiz.answers[quiz.current] !== -1) {
    showResults();
  }
}

function prevQuestion() {
  if (quiz.current > 0) { quiz.current--; renderQuestion(); }
}

function showResults() {
  let correct = 0, wrong = 0, skipped = 0;
  quiz.answers.forEach((a, i) => {
    if (a === -1) skipped++;
    else if (a === quiz.questions[i].correct) correct++;
    else wrong++;
  });
  const pct = Math.round(correct / quiz.total * 100);
  
  // Save best
  const prev = parseInt(localStorage.getItem('quiz_best') || '0');
  if (pct > prev) localStorage.setItem('quiz_best', pct);

  let grade = '';
  if (pct >= 90) grade = 'Відмінно! 🏆';
  else if (pct >= 75) grade = 'Добре! 💪';
  else if (pct >= 60) grade = 'Задовільно 📚';
  else grade = 'Потрібно більше практики 📖';

  document.getElementById('content').innerHTML = `
  <div class="results">
    <div class="results-card">
      <div class="score-circle" style="--pct:${pct}">
        <span class="pct">${pct}<span class="pct-sign">%</span></span>
      </div>
      <h2>${grade}</h2>
      <div class="sub">${correct} з ${quiz.total} правильних відповідей</div>
      <div class="result-stats">
        <div class="r-stat green"><div class="r-num">${correct}</div><div class="r-label">Правильно</div></div>
        <div class="r-stat red"><div class="r-num">${wrong}</div><div class="r-label">Помилки</div></div>
        <div class="r-stat gray"><div class="r-num">${skipped}</div><div class="r-label">Пропущено</div></div>
      </div>
      <div class="mode-buttons">
        <button class="mode-btn primary" onclick="showStart()">🔄 Почати знову</button>
        <button class="mode-btn secondary" onclick="showReview()">📋 Переглянути відповіді</button>
        <button class="mode-btn secondary" onclick="retryWrong()">🔁 Тільки помилкові (${wrong})</button>
      </div>
    </div>
  </div>`;
}

function showReview(filter='all') {
  const letters = 'ABCDE';
  let items = [];
  quiz.answers.forEach((a, i) => {
    const q = quiz.questions[i];
    let status = 'skip';
    if (a === -1) status = 'skip';
    else if (a === q.correct) status = 'correct';
    else status = 'wrong';
    items.push({i, q, a, status});
  });

  const filtered = filter === 'all' ? items : items.filter(x => x.status === filter);
  const counts = {all: items.length, correct: items.filter(x=>x.status==='correct').length, wrong: items.filter(x=>x.status==='wrong').length, skip: items.filter(x=>x.status==='skip').length};

  let html = `
  <div style="text-align:center;margin:20px 0">
    <button class="mode-btn secondary" onclick="showResults()" style="margin-bottom:20px">← До результатів</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn ${filter==='all'?'active':''}" onclick="showReview('all')">Всі (${counts.all})</button>
    <button class="filter-btn ${filter==='correct'?'active':''}" onclick="showReview('correct')">✅ Правильні (${counts.correct})</button>
    <button class="filter-btn ${filter==='wrong'?'active':''}" onclick="showReview('wrong')">❌ Помилки (${counts.wrong})</button>
    <button class="filter-btn ${filter==='skip'?'active':''}" onclick="showReview('skip')">⏭ Пропущені (${counts.skip})</button>
  </div>
  <div class="review-list">`;

  filtered.forEach(({i, q, a, status}) => {
    const cls = status === 'correct' ? 'ri-correct' : status === 'wrong' ? 'ri-wrong' : 'ri-skip';
    let info = '';
    if (status === 'correct') {
      info = `<span class="ri-right">✅ ${letters[a]}. ${escHtml(q.answers[a])}</span>`;
    } else if (status === 'wrong') {
      info = `<span class="ri-your">Ваша: ${letters[a]}. ${escHtml(q.answers[a])}</span><br><span class="ri-right">Вірна: ${letters[q.correct]}. ${escHtml(q.answers[q.correct])}</span>`;
    } else {
      info = `<span class="ri-right">Вірна: ${letters[q.correct]}. ${escHtml(q.answers[q.correct])}</span>`;
    }
    html += `<div class="review-item ${cls}">
      <div class="ri-q"><strong>#${i+1}.</strong> ${escHtml(q.question.substring(0,200))}${q.question.length>200?'...':''}</div>
      <div class="ri-info">${info}</div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
  window.scrollTo({top:0});
}

function retryWrong() {
  const wrongQs = [];
  quiz.answers.forEach((a, i) => {
    if (a !== -1 && a !== quiz.questions[i].correct) wrongQs.push(quiz.questions[i]);
  });
  if (wrongQs.length === 0) { showStart(); return; }
  quiz = { questions: shuffle(wrongQs), current: 0, answers: new Array(wrongQs.length).fill(-1), mode: 'practice', total: wrongQs.length };
  renderQuestion();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadQuestions();
</script>
</body>
</html>
